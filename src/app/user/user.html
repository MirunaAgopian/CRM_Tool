<mat-card>
  <table>
    <tr>
      <th>Name</th>
      <th>City</th>
      <th>Birth date</th>
    </tr>
    @for (u of allUsers; track u.id) {
      <tr [routerLink]="'/user/' + u.id">
        <td>{{ u.firstName }} {{ u.lastName }}</td>
        <td>{{u.city}}</td>
        <td>{{u.birthDate}}</td>
      </tr>
    }
  </table>
</mat-card>
<button
  (click)="openDialog()"
  class="add-user-fab"
  matTooltip="Add user"
  [matTooltipPosition]="'above'"
  matFab
  aria-label="Example icon button with a delete icon"
>
  <mat-icon>add</mat-icon>
</button>
