<mat-drawer-container class="mat-drawer-container" autosize>
  <mat-drawer #drawer class="sidenav" mode="side" [opened]="true">
    <div class="logo-container">
      <p>Logo comes here</p>
    </div>
    <ul class="menu-items">
      <li [routerLink]="['/dashboard']"><mat-icon>fact_check</mat-icon>Dashboard</li>
      <li [routerLink]="['/user']"><mat-icon>perm_identity</mat-icon>User</li>
    </ul>
  </mat-drawer>

  <div class="example-sidenav-content">
    <mat-toolbar>
      <mat-toolbar-row>
        <button
          matIconButton
          (click)="drawer.toggle()"
          class="menu-icon"
          aria-label="Example icon-button with menu icon"
        >
          <mat-icon>menu</mat-icon>
        </button>
        <span>Simple CRM</span>
      </mat-toolbar-row>
    </mat-toolbar>
  </div>
  <div class="router-container"><router-outlet /></div>
</mat-drawer-container>
