<section class="dialog">
  @if (loading) {
    <mat-progress-bar mode="indeterminate"></mat-progress-bar>
  }
  <h1 mat-dialog-title>Add user</h1>
  <div mat-dialog-content class="dialog-content">
    <div class="name-container">
      <mat-form-field appearance="outline">
        <mat-label>First name</mat-label>
        <input [disabled]="loading" [(ngModel)]="user.firstName" matInput />
        <mat-hint>Please ener a name</mat-hint>
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Last name</mat-label>
        <input [disabled]="loading" [(ngModel)]="user.lastName" matInput />
        <mat-hint>Please ener a name</mat-hint>
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline">
      <mat-label>Birth date</mat-label>
      <input [disabled]="loading" [(ngModel)]="birthDate" matInput [matDatepicker]="picker" />
      <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
      <mat-datepicker #picker></mat-datepicker>
      <mat-hint>Please ener a birth date</mat-hint>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Street and housenr.</mat-label>
      <input [disabled]="loading" [(ngModel)]="user.street" matInput />
      <mat-hint>Please ener an address</mat-hint>
    </mat-form-field>
    <div class="address-container">
      <mat-form-field appearance="outline">
        <mat-label>ZIP</mat-label>
        <input [disabled]="loading" [(ngModel)]="user.zipCode" matInput />
        <mat-hint>Please ener an zip code</mat-hint>
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>City</mat-label>
        <input [disabled]="loading" [(ngModel)]="user.city" matInput />
        <mat-hint>Please ener a city name</mat-hint>
      </mat-form-field>
    </div>
  </div>
  <div class="dialog-action-btns">
    <button [disabled]="loading" (click)="dialogRef.close()" mat-button>Cancel</button>
    <button [disabled]="loading" mat-button (click)="saveUser()">Save</button>
  </div>
</section>
